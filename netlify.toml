[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # NEXT_PUBLIC_* variables are intentionally public (they ship to the browser).
  # Tell Netlify's secrets scanner to ignore them so the build doesn't fail.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"
